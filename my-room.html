<!DOCTYPE html>
<html lang="fr" style="--sage-deep: #3d4a36; --sage: #5c6e54; --sage-light: #8a9b80; --sage-mist: #b8c4ac; --beige-deep: #c8b890; --beige: #dcd0b0; --beige-light: #ebe2c8; --cream: #f3ecd8; --ink: #1f2419; --ink-soft: #3a4032; --rule: rgba(61, 74, 54, 0.28);">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f3ecd8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Votre chambre — Justine &amp; Levani</title>
<meta name="description" content="Trouvez votre chambre au Château de Chaumont — Justine &amp; Levani, 5-6 septembre 2026.">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&amp;family=Italiana&amp;family=Inter:wght@300;400;500;600&amp;family=Pinyon+Script&amp;display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --display: 'Italiana', 'Cormorant Garamond', serif;
    --script: 'Pinyon Script', cursive;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    --vh: 1svh;
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--serif);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
    text-rendering: optimizeLegibility;
  }

  body {
    overflow-x: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  #app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--cream);
    position: relative;
    overflow-x: clip;
    overflow-y: visible;
    min-height: 100vh;
    min-height: 100dvh;
  }

  button, a, [role="button"] {
    touch-action: manipulation;
    -webkit-touch-callout: none;
  }

  @media (hover: none) {
    *:hover { transition: none !important; }
  }

  input, select, textarea {
    font-size: max(16px, 1em);
  }

  /* Grain overlay — identique au faire-part principal */
  #app::before {
    content: '';
    position: fixed;
    inset: -10%;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.45;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.36 0 0 0 0 0.43 0 0 0 0 0.33 0 0 0 0.22 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-size: 160px 160px;
    animation: grainShift 0.7s steps(8) infinite;
    will-change: transform;
  }
  @keyframes grainShift {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(-5%, 3%); }
    50%  { transform: translate(-3%, 4%); }
    75%  { transform: translate(-1%, -3%); }
    100% { transform: translate(0, 0); }
  }
  @media (prefers-reduced-motion: reduce) {
    #app::before { animation: none; }
  }

  h2 {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(48px, 13vw, 72px);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-align: center;
  }
  h2 .it {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 0.34em;
    color: var(--sage-deep);
    display: block;
    margin-top: 12px;
    letter-spacing: 0.06em;
    line-height: 1.4;
  }
  h2 .em {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    color: var(--sage-deep);
  }

  .eyebrow {
    display: flex; align-items: center; gap: 14px;
    align-self: center;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--sage-deep);
  }
  .eyebrow .num {
    font-family: var(--display);
    font-size: 14px;
    color: var(--sage);
    letter-spacing: 0;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; width: 28px; height: 1px; background: var(--sage-deep); opacity: 0.45;
  }

  .blur-in {
    opacity: 0;
    filter: blur(14px);
    transform: translateY(14px);
    transition: opacity 1.4s cubic-bezier(.2,.8,.2,1),
                filter 1.4s cubic-bezier(.2,.8,.2,1),
                transform 1.4s cubic-bezier(.2,.8,.2,1);
  }
  .blur-in.in {
    opacity: 1;
    filter: blur(0);
    transform: translateY(0);
  }

  ::selection { background: var(--sage); color: var(--cream); }

  /* "Retour" — FAB flottant en haut à gauche, miroir exact du lang-switcher
     (côté droit) et du même comportement scroll-hide via body.fabs-hidden.
     Apparition différée à l'identique pour que les deux FABs se révèlent
     ensemble. */
  .back-link {
    position: fixed;
    top: max(18px, env(safe-area-inset-top));
    left: max(18px, env(safe-area-inset-left));
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    border-radius: 999px;
    background: rgba(243, 236, 216, 0.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--rule);
    box-shadow: 0 4px 18px rgba(31, 36, 25, 0.08);
    color: var(--sage-deep);
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    text-decoration: none;
    opacity: 0;
    transform: scale(0.85);
    pointer-events: none;
    transition:
      opacity 0.9s cubic-bezier(.2,.8,.2,1) 0.6s,
      transform 0.9s cubic-bezier(.2,.8,.2,1) 0.6s,
      background 0.25s, color 0.25s;
  }
  body.has-lang .back-link {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  body.has-lang.fabs-hidden .back-link {
    opacity: 0;
    transform: translateY(-12px) scale(0.92);
    pointer-events: none;
    transition:
      opacity 0.35s cubic-bezier(.2,.8,.2,1),
      transform 0.35s cubic-bezier(.2,.8,.2,1);
  }
  .back-link:hover { background: var(--sage-deep); color: var(--cream); }
  .back-link .arrow { font-family: var(--display); font-size: 14px; letter-spacing: 0; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="components/icons.jsx" data-filename="components/icons.jsx"></script>
<script type="text/babel" src="components/i18n.jsx" data-filename="components/i18n.jsx"></script>
<script type="text/babel" src="components/lang-switcher.jsx" data-filename="components/lang-switcher.jsx"></script>
<script type="text/babel" src="components/my-room.jsx" data-filename="components/my-room.jsx"></script>

<script type="text/babel" data-presets="react">
// Bootstrap : lit ?lang= dans l'URL, fournit le LangContext, monte MyRoom +
// LangSwitcher. La langue choisie est synchronisée dans l'URL pour le partage.
(() => {
  const { useState, useEffect } = React;

  const SUPPORTED = ['fr', 'ge', 'de'];
  const readLang = () => {
    const u = new URL(window.location.href);
    const q = u.searchParams.get('lang');
    if (q && SUPPORTED.includes(q)) return q;
    const stored = localStorage.getItem('jl_lang');
    if (stored && SUPPORTED.includes(stored)) return stored;
    // Petit fallback navigateur
    const nav = (navigator.language || 'fr').slice(0, 2).toLowerCase();
    if (nav === 'ka') return 'ge';
    if (nav === 'de') return 'de';
    return 'fr';
  };

  const MyRoomApp = () => {
    const [lang, setLang] = useState(readLang);

    useEffect(() => {
      document.documentElement.setAttribute('lang', lang === 'ge' ? 'ka' : lang);
      document.body.classList.add('has-lang');
      try { localStorage.setItem('jl_lang', lang); } catch (e) {}
      // Met à jour ?lang= dans l'URL sans recharger
      const u = new URL(window.location.href);
      u.searchParams.set('lang', lang);
      window.history.replaceState({}, '', u);
      // Met à jour le titre dans la langue active
      const t = (window.TRANSLATIONS?.[lang] || window.TRANSLATIONS?.fr)?.myroom;
      if (t?.doc_title) document.title = t.doc_title;
    }, [lang]);

    // Cache les widgets flottants au scroll, comme sur la page principale
    useEffect(() => {
      let lastY = window.scrollY;
      let ticking = false;
      const onScroll = () => {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const y = window.scrollY;
          const delta = y - lastY;
          if (y < 60) document.body.classList.remove('fabs-hidden');
          else if (delta > 4) document.body.classList.add('fabs-hidden');
          else if (delta < -4) document.body.classList.remove('fabs-hidden');
          lastY = y;
          ticking = false;
        });
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      return () => {
        window.removeEventListener('scroll', onScroll);
        document.body.classList.remove('fabs-hidden');
      };
    }, []);

    return (
      <window.LangContext.Provider value={lang}>
        <window.LangSwitcher lang={lang} onSelect={setLang} />
        <a className="back-link" href={`index.html?lang=${lang}`} aria-label="Retour au faire-part">
          <span className="arrow">←</span>
          <span>{lang === 'ge' ? 'უკან' : lang === 'de' ? 'Zurück' : 'Retour'}</span>
        </a>
        <window.MyRoom />
      </window.LangContext.Provider>
    );
  };

  const renderApp = () => {
    const el = document.getElementById('app');
    if (!el) return;
    if (el._reactRoot) el._reactRoot.render(<MyRoomApp />);
    else {
      el._reactRoot = ReactDOM.createRoot(el);
      el._reactRoot.render(<MyRoomApp />);
    }
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderApp);
  } else {
    renderApp();
  }
})();
</script>
</body>
</html>
