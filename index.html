<style>
  :root {
    --sage-deep: #5c6e54;
    --sage: #7a8b6f;
    --sage-light: #a8b89a;
    --sage-mist: #c8d2bd;
    --beige-deep: #d4c4a3;
    --beige: #e8dfc9;
    --beige-light: #f1ead8;
    --cream: #f7f2e6;
    --ink: #2a2e25;
    --ink-soft: #4a4e44;
    --rule: rgba(92, 110, 84, 0.22);

    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --display: 'Italiana', 'Cormorant Garamond', serif;
    --script: 'Pinyon Script', cursive;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    /* Prevent iOS Safari from auto-zooming on text after orientation change */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    /* Stable viewport unit fallback chain */
    --vh: 1svh;
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--serif);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
    text-rendering: optimizeLegibility;
  }

  body {
    overflow-x: hidden;
    /* Respect notch / dynamic island on iOS */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  #app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--cream);
    position: relative;
    overflow-x: clip;
    overflow-y: visible;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* Buttons + interactive elements: avoid double-tap zoom and stuck hover */
  button, a, [role="button"] {
    touch-action: manipulation;
    -webkit-touch-callout: none;
  }

  /* Restrict :hover styles to devices that actually have hover (desktop) so
     they don't stick on touch devices after a tap. */
  @media (hover: none) {
    *:hover { transition: none !important; }
  }

  /* Inputs >= 16px to avoid iOS zoom-on-focus */
  input, select, textarea {
    font-size: max(16px, 1em);
  }

  /* Grain texture overlay */
  #app::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.35;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.36 0 0 0 0 0.43 0 0 0 0 0.33 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  :where(section.scene) {
    min-height: 100vh;       /* fallback for old engines */
    min-height: 100svh;       /* small viewport — chrome visible */
    min-height: 100dvh;       /* dynamic — adapts to chrome show/hide */
    width: 100%;
    max-width: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 48px 28px;
    scroll-snap-align: start;
    /* Safety net so no inner element can ever push the page sideways. */
    overflow-x: clip;
  }
  :where(section.scene) > * { max-width: 100%; }

  ::selection { background: var(--sage); color: var(--cream); }

  /* ----- GLOBAL TYPO SYSTEM (unified across all scenes) ---------------- */

  /* All section H2s share the same display face. Italic accents inside .it. */
  h2 {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(48px, 13vw, 72px);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-align: center;
  }
  h2 .it {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 0.34em;
    color: var(--sage-deep);
    display: block;
    margin-top: 12px;
    letter-spacing: 0.06em;
    line-height: 1.4;
  }
  h2 .em {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    color: var(--sage-deep);
  }

  /* Eyebrow tag above each H2 — sans-serif spaced, sauge */
  .eyebrow {
    display: flex; align-items: center; gap: 14px;
    align-self: center;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--sage-deep);
  }
  .eyebrow .num {
    font-family: var(--display);
    font-size: 14px;
    color: var(--sage);
    letter-spacing: 0;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; width: 28px; height: 1px; background: var(--sage-deep); opacity: 0.45;
  }

  /* ----- BLUR-IN reveal animation (used on H2s and key text) ----------- */

  .blur-in {
    opacity: 0;
    filter: blur(14px);
    transform: translateY(14px);
    transition: opacity 1.4s cubic-bezier(.2,.8,.2,1),
                filter 1.4s cubic-bezier(.2,.8,.2,1),
                transform 1.4s cubic-bezier(.2,.8,.2,1);
  }
  .blur-in.in {
    opacity: 1;
    filter: blur(0);
    transform: translateY(0);
  }

  /* Letter-by-letter blur-in on words split with .word */
  .word-blur > .word {
    display: inline-block;
    opacity: 0;
    filter: blur(10px);
    transform: translateY(8px);
    transition: opacity 1s cubic-bezier(.2,.8,.2,1),
                filter 1s cubic-bezier(.2,.8,.2,1),
                transform 1s cubic-bezier(.2,.8,.2,1);
  }
  .word-blur.in > .word { opacity: 1; filter: blur(0); transform: translateY(0); }
  .word-blur.in > .word:nth-child(1) { transition-delay: 0.05s; }
  .word-blur.in > .word:nth-child(2) { transition-delay: 0.20s; }
  .word-blur.in > .word:nth-child(3) { transition-delay: 0.35s; }
  .word-blur.in > .word:nth-child(4) { transition-delay: 0.50s; }
  .word-blur.in > .word:nth-child(5) { transition-delay: 0.65s; }
  .word-blur.in > .word:nth-child(6) { transition-delay: 0.80s; }

  /* Reduced motion: still respect but our animations are scroll-driven */
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style></head>
